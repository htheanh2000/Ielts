name: Deploy IELTS to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ielts-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH + pull + restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/ielts
            git fetch --all
            git reset --hard origin/main

            # Idempotent Traefik dynamic config copy
            cp deploy/traefik-ielts.yml /srv/traefik/data/dynamic/ielts.yml

            # Nginx picks up volume-mounted files immediately;
            # restart only if compose or nginx.conf itself changed.
            if git diff --name-only HEAD@{1} HEAD 2>/dev/null | grep -qE '^(docker-compose\.yml|deploy/nginx\.conf)$'; then
              docker compose up -d --force-recreate
            else
              docker compose up -d
            fi

            docker compose ps

      - name: Smoke test
        run: |
          sleep 8
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ielts.huynhtheanh.com/)
          echo "Landing: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ielts.huynhtheanh.com/reading/lesson/1/)
          echo "Reading L1: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ielts.huynhtheanh.com/writing/lesson/2/)
          echo "Writing L2: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ielts.huynhtheanh.com/listening/lesson/1/)
          echo "Listening L1: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

          echo "Deploy verified"
