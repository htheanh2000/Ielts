name: Deploy IELTS to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ielts-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static dist/
        run: bash scripts/build-static.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ielts --branch=main --commit-dirty=true

      - name: Smoke test
        run: |
          sleep 8
          for url in \
            https://ielts.huynhtheanh.com/ \
            https://ielts.huynhtheanh.com/reading/lesson/1/ \
            https://ielts.huynhtheanh.com/writing/lesson/2/ \
            https://ielts.huynhtheanh.com/listening/lesson/1/
          do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$url")
            echo "$url → HTTP $STATUS"
            [ "$STATUS" = "200" ] || exit 1
          done
          echo "✓ Deploy verified"
