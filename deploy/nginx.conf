server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ═════════ Security headers ═════════
    # HSTS: 1 year + include subdomains + preload-ready
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide deploy/git internals
    location ~ ^/(deploy|\.git|\.github)(/|$) {
        return 404;
    }

    # Silence favicon 404 noise (returns 204 No Content)
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # Pretty URLs: /reading/lesson/1 → /reading/lesson/1/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long cache for static assets (JS, CSS, fonts, images)
    location ~* \.(js|css|woff2|png|jpg|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        # Re-apply security headers inside this location (add_header scopes reset per block)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # HTML: always revalidate so updates land immediately
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip for text
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Compact logging
    access_log off;
    error_log /var/log/nginx/error.log warn;
}
