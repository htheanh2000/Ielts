server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide deploy/git internals from public serving
    location ~ ^/(deploy|\.git|\.github)(/|$) {
        return 404;
    }

    # Pretty URLs: /reading/lesson/1 → /reading/lesson/1/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long cache for static assets
    location ~* \.(js|css|woff2|png|jpg|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # HTML: always revalidate so updates land immediately after deploy
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Gzip for text
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Compact access log; errors only
    access_log off;
    error_log /var/log/nginx/error.log warn;
}
